<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Day 1 破冰对话引导二叉树</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --ink: #18202f;
      --muted: #687386;
      --line: #cbd4e2;
      --card: #ffffff;
      --a: #2563eb;
      --b: #db2777;
      --handoff: #16804a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 32px;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    header {
      max-width: 1120px;
      margin: 0 auto 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .legend {
      display: flex;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.75);
      border: 1px solid rgba(203,212,226,.8);
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.a { background: var(--a); }
    .dot.b { background: var(--b); }
    .dot.h { background: var(--handoff); }

    .tree {
      display: inline-flex;
      min-width: max-content;
      align-items: flex-start;
      justify-content: center;
      padding: 4px 0 36px;
    }

    .subtree {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .children {
      position: relative;
      display: inline-flex;
      align-items: flex-start;
      justify-content: center;
      gap: 16px;
      padding-top: 44px;
    }

    .children::before {
      content: "";
      position: absolute;
      top: 17px;
      left: 50%;
      width: calc(50% + 8px);
      height: 1px;
      transform: translateX(-50%);
      background: var(--line);
    }

    .child-branch {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
    }

    .child-branch::before {
      content: "";
      position: absolute;
      top: -27px;
      left: 50%;
      width: 1px;
      height: 27px;
      background: var(--line);
    }

    .branch-label {
      position: absolute;
      top: -39px;
      left: 50%;
      z-index: 2;
      max-width: 210px;
      transform: translateX(-50%);
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      box-shadow: 0 2px 6px rgba(23, 34, 54, .05);
    }

    .branch-label.a {
      color: var(--a);
      border-color: rgba(37,99,235,.35);
    }

    .branch-label.b {
      color: var(--b);
      border-color: rgba(219,39,119,.35);
    }

    .node {
      position: relative;
      width: 300px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--card);
      box-shadow: 0 8px 22px rgba(23, 34, 54, .08);
      padding: 12px;
      min-height: 152px;
    }

    .subtree.depth-0 > .node { width: 520px; }
    .subtree.depth-1 > .node { width: 420px; }
    .subtree.depth-2 > .node { width: 330px; }
    .subtree.depth-3 > .node { width: 250px; }
    .subtree.depth-4 > .node { width: 230px; }

    .node.leaf {
      border-color: rgba(22,128,74,.35);
      background: #f7fff9;
    }

    .id {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: #eef3ff;
      color: #2851a3;
      font-weight: 700;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .line {
      font-size: 13px;
      line-height: 1.55;
      margin-bottom: 10px;
    }

    .options {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      border-top: 1px dashed #d8e0eb;
      padding-top: 8px;
    }

    .option strong {
      color: var(--a);
      margin-right: 4px;
    }

    .option.b strong { color: var(--b); }

    .handoff {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(22,128,74,.22);
      color: #146c43;
      font-size: 12px;
      line-height: 1.45;
    }

    .handoff b {
      display: block;
      margin-bottom: 3px;
    }

    .fallback {
      max-width: 1120px;
      margin: 8px auto 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .fallback-card {
      border-radius: 8px;
      border: 1px solid #d8e0eb;
      background: #fff;
      padding: 12px 14px;
      box-shadow: 0 8px 22px rgba(23, 34, 54, .06);
      font-size: 13px;
      line-height: 1.6;
    }

    .fallback-card b { display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <header>
    <h1>Day 1：初次相识与第一印象</h1>
    <p class="subtitle">每个节点框里是猫娘台词；下方是 A/B 选项和下一步去向。最底层节点选择后进入普通聊天承接，不再继续教程树。</p>
    <div class="legend">
      <span><i class="dot a"></i>A 选项</span>
      <span><i class="dot b"></i>B 选项</span>
      <span><i class="dot h"></i>普通聊天承接</span>
    </div>
  </header>

  <main class="tree" id="tree"></main>

  <section class="fallback">
    <div class="fallback-card">
      <b>自由输入跑题一次拉回</b>
      喵～你先理一理眼前这两个选项嘛，选完本喵随便你聊到天荒地老。回来回来。
    </div>
    <div class="fallback-card">
      <b>再次跑题放回普通聊天</b>
      好吧，你赢了。那你想聊什么？本喵今天心情好，陪你聊聊你感兴趣的事。说吧。
    </div>
  </section>

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function optionHtml(kind, option) {
      const label = option ? option[0] : "";
      const next = option ? option[1] : "";
      return `<div class="option ${kind.toLowerCase()}"><strong>${kind}</strong>${escapeHtml(label)} → ${escapeHtml(next)}</div>`;
    }

    function nodeHtml(id) {
      const node = nodes[id];
      return `
        <article class="node ${node.leaf ? "leaf" : ""}">
          <span class="id">${escapeHtml(id)}</span>
          <div class="line">${escapeHtml(node.line)}</div>
          <div class="options">
            ${optionHtml("A", node.A)}
            ${optionHtml("B", node.B)}
          </div>
          ${node.leaf ? `
            <div class="handoff"><b>A 后普通聊天</b>${escapeHtml(node.handoffA)}</div>
            <div class="handoff"><b>B 后普通聊天</b>${escapeHtml(node.handoffB)}</div>
          ` : ""}
        </article>
      `;
    }

    function branchHtml(kind, parentId, childId, depth) {
      const parent = nodes[parentId];
      const label = parent && parent[kind] ? parent[kind][0] : kind;
      return `
        <div class="child-branch">
          <span class="branch-label ${kind.toLowerCase()}">${kind}：${escapeHtml(label)}</span>
          ${subtreeHtml(childId, depth)}
        </div>
      `;
    }

    function subtreeHtml(id, depth = 0) {
      const node = nodes[id];
      if (!node) return "";
      const nextA = node.A && nodes[node.A[1]] ? node.A[1] : "";
      const nextB = node.B && nodes[node.B[1]] ? node.B[1] : "";
      return `
        <section class="subtree depth-${depth}">
          ${nodeHtml(id)}
          ${nextA && nextB ? `
            <div class="children">
              ${branchHtml("A", id, nextA, depth + 1)}
              ${branchHtml("B", id, nextB, depth + 1)}
            </div>
          ` : ""}
        </section>
      `;
    }

    function markBranchSpans() {
      document.querySelectorAll(".children").forEach((children) => {
        const branches = children.querySelectorAll(":scope > .child-branch");
        if (branches.length !== 2) return;
        const first = branches[0].getBoundingClientRect();
        const second = branches[1].getBoundingClientRect();
        const parent = children.getBoundingClientRect();
        const leftCenter = first.left + first.width / 2 - parent.left;
        const rightCenter = second.left + second.width / 2 - parent.left;
        const x = Math.min(leftCenter, rightCenter);
        const width = Math.abs(rightCenter - leftCenter);
        children.style.setProperty("--line-left", `${x}px`);
        children.style.setProperty("--line-width", `${width}px`);
      });
    }

    const tree = document.getElementById("tree");
    tree.innerHTML = subtreeHtml("1", 0);
    window.addEventListener("load", markBranchSpans);
    window.addEventListener("resize", markBranchSpans);
  </script>
  <style>
    .children::before {
      left: var(--line-left, 50%);
      width: var(--line-width, 0px);
      transform: none;
    }
  </style>
